<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Interface</title>
  <style>
    body {
      background: #0d0f10;
      color: #d8e6ee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .spinner {
      border: 4px solid #1a2128;
      border-top: 4px solid #2eff9a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Redirecting to Secure Payment Portal...</h2>
  <p>Please hold on while we generate your invoice checkout summary session.</p>
</body>
</html>
